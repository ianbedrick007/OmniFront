{{#> base title="Login | OmniLabs Platform" bodyClass="pattern-bg" }}

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div
        style="width: 100%; max-width: 400px; padding: 2.5rem; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="justify-content: center;">
                <img src="media/transp%20background%201,%20omni.png" alt="OmniLabs Logo"
                    style="height: 32px; width: 32px; object-fit: contain; border-radius: 4px;">
                <span style="font-size: 1.5rem;">Omni<span>Labs</span></span>
            </a>
            <p style="color: var(--slate); margin-top: 0.5rem;">Sign in to your console</p>
        </div>

        <form id="login-form">
            <div id="error-msg"
                style="display: none; padding: 0.75rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #EF4444; border-radius: 4px; margin-bottom: 1.5rem; font-size: 0.85rem;">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label
                    style="display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--slate);">Username</label>
                <input type="text" id="username" required
                    style="width: 100%; padding: 0.85rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 2rem;">
                <label
                    style="display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--slate);">Password</label>
                <input type="password" id="password" required
                    style="width: 100%; padding: 0.85rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 4px;">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 0.85rem; justify-content: center; border-radius: 4px;">Sign In</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--slate); font-size: 0.85rem;">
            By signing in, you agree to our Terms of Service
        </div>
    </div>
</div>

<script type="module" src="js/login.js"></script>

{{/base}}
