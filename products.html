{{#> base title="Product Catalog | OmniLabs Platform" bodyClass="dashboard-layout pattern-bg" }}

{{> sidebar activeLink="billing" }}

<!-- Main Content -->
<main class="main-content">
    <div class="top-bar">
        <div>
            <button onclick="toggleSidebar()" class="btn btn-outline"
                style="display: none; border:none; padding: 0.5rem;" id="menu-btn">☰</button>
            <h2 class="top-bar-title" style="margin: 0; display: inline-block;">Product Catalog</h2>
        </div>
        <div class="user-profile">
            <div class="avatar">AD</div>
        </div>
    </div>

    <div class="data-table-wrapper">
        <div
            style="padding: 1.5rem; border-bottom: 1px solid rgba(138, 147, 163, 0.2); display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-size: 1.1rem; font-weight: 700;">INVENTORY ITEMS</h3>
            <button class="btn btn-primary btn-sm">+ Add Product</button>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Category</th>
                    <th>Stock Level</th>
                    <th>Price (GHS)</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="products-table-body">
                <!-- Products will be loaded here via JS -->
                <tr>
                    <td colspan="6" style="text-align: center; padding: 3rem; color: var(--slate);">Loading catalog...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<script type="module" src="js/products.js"></script>

{{/base}}
